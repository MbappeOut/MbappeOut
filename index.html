<!DOCTYPE html>
<html>
<head>
    <title>MBAPPE OUT</title>
    <link rel="stylesheet" href="/estilos.css">
</head>
<body>

<h1 class="title">MAKE YOUR VOICE HEARD</h1>

<div class="container">

<!-- 🔴 MBAPPE -->
<div class="side">

    <div class="hero">
        <img src="/static/mbappe.png" class="hero-img">
        <div class="overlay"></div>
        <div class="stamp red">MBAPPE</div>
    </div>

    <div class="desc">
        Madridistas, decide Mbappé future at Real Madrid.
    </div>

    <!-- 🔴 MBAPPE OUT -->
    <div class="counter-card">
        <div class="counter-top">
            <div id="mbappeOutCount" class="counter-number red">0</div>
            <span class="label red">OUT</span>
        </div>

        <div class="progress">
            <div id="mbappeOutBar" class="bar bar-red"></div>
        </div>
    </div>

    <form action="/vote" method="post">
        <button name="option" value="mbappe_out" class="btn-red">
            REMOVE MBAPPE ❌
        </button>
    </form>

    <!-- 🟡 MBAPPE STAY -->
    <div class="counter-card">
        <div class="counter-top">
            <div id="mbappeStayCount" class="counter-number gold">0</div>
            <span class="label gold">STAY</span>
        </div>

        <div class="progress">
            <div id="mbappeStayBar" class="bar bar-gold"></div>
        </div>
    </div>

    <form action="/vote" method="post">
        <button name="option" value="mbappe_stay" class="btn-gold">
            KEEP MBAPPE ⭐
        </button>
    </form>

</div>

<!-- 🟡 VINICIUS -->
<div class="side">

    <div class="hero">
        <img src="/img/vini.png" class="hero-img">
        <div class="overlay"></div>
        <div class="stamp gold">VINI</div>
    </div>

    <div class="desc">
        Decide Vinícius future at Real Madrid. Your vote matters.
    </div>

    <!-- 🔴 VINI OUT -->
    <div class="counter-card">
        <div class="counter-top">
            <div id="viniOutCount" class="counter-number red">0</div>
            <span class="label red">OUT</span>
        </div>

        <div class="progress">
            <div id="viniOutBar" class="bar bar-red"></div>
        </div>
    </div>

    <form action="/vote" method="post">
        <button name="option" value="vini_out" class="btn-red">
            REMOVE VINICIUS ❌
        </button>
    </form>

    <!-- 🟡 VINI STAY -->
    <div class="counter-card">
        <div class="counter-top">
            <div id="viniStayCount" class="counter-number gold">0</div>
            <span class="label gold">STAY</span>
        </div>

        <div class="progress">
            <div id="viniStayBar" class="bar bar-gold"></div>
        </div>
    </div>

    <form action="/vote" method="post">
        <button name="option" value="vini_stay" class="btn-gold">
            KEEP VINICIUS ⭐
        </button>
    </form>

</div>

<script>
async function updateStats() {
    try {
        const res = await fetch('/stats');
        const data = await res.json();

        const mbappe = data.mbappe || 0;
        const vini = data.vinicius || 0;
        const stay = data.stay || 0;

        const total = mbappe + vini + stay || 1;

        animateValue("mbappeCount", mbappe);
        animateValue("viniCount", vini);

        document.getElementById("mbappeBar").style.width =
            (mbappe / total * 100) + "%";

        document.getElementById("viniBar").style.width =
            (vini / total * 100) + "%";

    } catch (e) {
        console.log("error stats", e);
    }
}

function animateValue(id, newValue) {
    const el = document.getElementById(id);
    const current = parseInt(el.innerText) || 0;

    if (current === newValue) return;

    let start = current;
    const increment = (newValue - start) / 20;

    const timer = setInterval(() => {
        start += increment;
        el.innerText = Math.floor(start);

        if (Math.abs(start - newValue) < 1) {
            el.innerText = newValue;
            clearInterval(timer);
        }
    }, 20);
}

setInterval(updateStats, 3000);
updateStats();
</script>

</body>
</html>
