<!DOCTYPE html>
<html>
<head>
    <title>MBAPPE OUT</title>
    <link rel="stylesheet" href="/estilos.css">
</head>
<body>

<h1 class="title">MAKE YOUR VOICE HEARD</h1>

<div class="container">

    <!-- 🔴 MBAPPE -->
    <div class="side">
        <img src="/img/mbappe.png" class="player">

        <div id="mbappeCount" class="counter">0</div>

        <div class="progress">
            <div id="mbappeBar" class="bar bar-red"></div>
        </div>

        <!-- OUT -->
        <form action="/vote" method="post">
            <button name="option" value="mbappe" class="big-btn big-btn-red">
                SIGN TO REMOVE ❌
            </button>
        </form>

        <!-- STAY -->
        <form action="/vote" method="post">
            <button name="option" value="stay" class="big-btn big-btn-gold">
                KEEP MBAPPE ⭐
            </button>
        </form>
    </div>

    <!-- 🟢 VINICIUS -->
    <div class="side">
        <img src="/img/vini.png" class="player">

        <div id="viniCount" class="counter">0</div>

        <div class="progress">
            <div id="viniBar" class="bar bar-gold"></div>
        </div>

        <!-- OUT -->
        <form action="/vote" method="post">
            <button name="option" value="mbappe" class="big-btn big-btn-red">
                REMOVE MBAPPE ❌
            </button>
        </form>

        <!-- STAY -->
        <form action="/vote" method="post">
            <button name="option" value="stay" class="big-btn big-btn-gold">
                KEEP VINICIUS ⭐
            </button>
        </form>
    </div>

</div>

<!-- 🔥 SCRIPT -->
<script>
async function updateStats() {
    try {
        const res = await fetch('/stats');
        const data = await res.json();

        const mbappe = data.mbappe || 0;
        const stay = data.stay || 0;
        const vini = data.vinicius || 0;

        const total = mbappe + stay + vini || 1;

        // 🔢 counters
        animateValue("mbappeCount", mbappe);
        animateValue("viniCount", vini);

        // 📊 barras
        document.getElementById("mbappeBar").style.width =
            (mbappe / total * 100) + "%";

        document.getElementById("viniBar").style.width =
            (vini / total * 100) + "%";

    } catch (e) {
        console.log("error stats", e);
    }
}

function animateValue(id, newValue) {
    const el = document.getElementById(id);
    const current = parseInt(el.innerText) || 0;

    if (current === newValue) return;

    let start = current;
    const duration = 400;
    const stepTime = 20;
    const steps = duration / stepTime;
    const increment = (newValue - start) / steps;

    let count = 0;

    const timer = setInterval(() => {
        start += increment;
        el.innerText = Math.floor(start);

        count++;
        if (count >= steps) {
            el.innerText = newValue;
            clearInterval(timer);

            el.classList.add("flash");
            setTimeout(() => el.classList.remove("flash"), 300);
        }
    }, stepTime);
}

// 🔄 refresh cada 3s
setInterval(updateStats, 3000);
updateStats();
</script>

</body>
</html>
