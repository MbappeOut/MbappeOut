<!DOCTYPE html>
<html>
<head>
    <title>MBAPPE OUT</title>
    <link rel="stylesheet" href="/estilos.css">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<h1 class="title">MAKE YOUR VOICE HEARD</h1>

<div class="container">

<!-- 🔴 MBAPPÉ -->
<div class="side">

    <div class="hero">
        <img src="/img/mbappe1.png" class="hero-img">
        <div class="overlay"></div>
        <div class="stamp red">OUT</div>
    </div>

    <div class="desc">
        Madridistas, make your voice heard. Decide Mbappé’s future.
    </div>

    <!-- 🔴 MBAPPÉ OUT -->
    <div class="vote-box">
        <div class="vote-header">
            <span id="mbappeOutCount" class="counter-number">0</span>
            <div class="vote-goal">
                <span>200,000</span>
                <small>GOAL</small>
            </div>
        </div>

        <div class="vote-label">REMOVE MBAPPÉ</div>

        <div class="vote-bar">
            <div id="mbappeOutBar" class="vote-fill red"></div>
        </div>
    </div>

    <form action="/vote" method="post">
        <button name="option" value="mbappe_out" class="btn-red">
            REMOVE MBAPPÉ ❌
        </button>
    </form>

    <!-- 🟡 MBAPPÉ STAY -->
    <div class="vote-box">
        <div class="vote-header">
            <span id="mbappeStayCount" class="counter-number">0</span>
            <div class="vote-goal gold">
                <span>200,000</span>
                <small>GOAL</small>
            </div>
        </div>

        <div class="vote-label">KEEP MBAPPÉ</div>

        <div class="vote-bar">
            <div id="mbappeStayBar" class="vote-fill gold"></div>
        </div>
    </div>

    <form action="/vote" method="post">
        <button name="option" value="mbappe_stay" class="btn-gold">
            KEEP MBAPPÉ ⭐
        </button>
    </form>

</div>


<!-- 🟡 VINICIUS -->
<div class="side">

    <div class="hero">
        <img src="/img/vini.png" class="hero-img">
        <div class="overlay"></div>
        <div class="stamp gold">STAY</div>
    </div>

    <div class="desc">
        Decide Vinícius future at Real Madrid. Your vote matters.
    </div>

    <!-- 🔴 VINI OUT -->
    <div class="vote-box">
        <div class="vote-header">
            <span id="viniOutCount" class="counter-number">0</span>
            <div class="vote-goal">
                <span>200,000</span>
                <small>GOAL</small>
            </div>
        </div>

        <div class="vote-label">REMOVE VINICIUS</div>

        <div class="vote-bar">
            <div id="viniOutBar" class="vote-fill red"></div>
        </div>
    </div>

    <form action="/vote" method="post">
        <button name="option" value="vini_out" class="btn-red">
            REMOVE VINICIUS ❌
        </button>
    </form>

    <!-- 🟡 VINI STAY -->
    <div class="vote-box">
        <div class="vote-header">
            <span id="viniStayCount" class="counter-number">0</span>
            <div class="vote-goal gold">
                <span>200,000</span>
                <small>GOAL</small>
            </div>
        </div>

        <div class="vote-label">KEEP VINICIUS</div>

        <div class="vote-bar">
            <div id="viniStayBar" class="vote-fill gold"></div>
        </div>
    </div>

    <form action="/vote" method="post">
        <button name="option" value="vini_stay" class="btn-gold">
            KEEP VINICIUS ⭐
        </button>
    </form>

</div>

<footer class="mini-footer">
    HALA MADRID
</footer>
<script>
async function updateStats() {
    try {
        const res = await fetch('/stats');
        const data = await res.json();

        // 🔥 DATOS BACKEND
        const mbappeOut = data.mbappe_out || 0;
        const mbappeStay = data.mbappe_stay || 0;
        const viniOut = data.vini_out || 0;
        const viniStay = data.vini_stay || 0;

        // 🔥 GOAL (si luego lo mandas desde backend mejor)
        const GOAL = data.goal || 200000;

        // 🔢 CONTADORES
        animateValue("mbappeOutCount", mbappeOut);
        animateValue("mbappeStayCount", mbappeStay);
        animateValue("viniOutCount", viniOut);
        animateValue("viniStayCount", viniStay);

        // 🔥 FUNCIÓN CORRECTA DE PROGRESO
        function calcProgress(votos, goal) {
            if (goal <= 0) goal = 1;
            let p = (votos / goal) * 100;
            return Math.min(p, 100); // 🔥 no pasa de 100%
        }

        // 📊 BARRAS (YA CORRECTAS)
        document.getElementById("mbappeOutBar").style.width =
            calcProgress(mbappeOut, GOAL) + "%";

        document.getElementById("mbappeStayBar").style.width =
            calcProgress(mbappeStay, GOAL) + "%";

        document.getElementById("viniOutBar").style.width =
            calcProgress(viniOut, GOAL) + "%";

        document.getElementById("viniStayBar").style.width =
            calcProgress(viniStay, GOAL) + "%";

    } catch (e) {
        console.log("error stats", e);
    }
}

function animateValue(id, newValue) {
    const el = document.getElementById(id);
    if (!el) return;

    const current = parseInt(el.innerText.replace(/\./g, '')) || 0;

    if (current === newValue) return;

    let start = current;
    const increment = (newValue - start) / 20;

    const timer = setInterval(() => {
        start += increment;

        el.innerText = Math.floor(start).toLocaleString("es-CO");

        if (Math.abs(start - newValue) < 1) {
            el.innerText = newValue.toLocaleString("es-CO");
            clearInterval(timer);
        }
    }, 20);
}

// 🔄 ACTUALIZA CADA 3 SEGUNDOS
setInterval(updateStats, 3000);

// 🚀 PRIMERA CARGA
updateStats();
</script>

</body>
</html>
