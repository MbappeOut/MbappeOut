<!DOCTYPE html>
<html>
<head>
    <title>MBAPPE OUT</title>
    <link rel="stylesheet" href="/estilos.css">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<h1 class="title">MAKE YOUR VOICE HEARD</h1>

<div class="container">

<!-- 🔴 MBAPPÉ -->
<div class="side">

    <div class="hero">
        <img src="/img/mbappe1.png" class="hero-img">
        <div class="overlay"></div>
        <div class="stamp red">OUT?</div>
    </div>

    <div class="desc">
        Madridistas, make your voice heard. Decide Mbappé’s future.
    </div>

    <!-- 🔴 MBAPPÉ OUT -->
    <div class="vote-box">
        <div class="vote-header">
            <span id="mbappeOutCount" class="counter-number">0</span>
            <div class="vote-goal">
                <span>200,000</span>
                <small>GOAL</small>
            </div>
        </div>

        <div class="vote-label">REMOVE MBAPPÉ</div>

        <div class="vote-bar">
            <div id="mbappeOutBar" class="vote-fill red"></div>
        </div>
    </div>

    <!-- 🔥 BOTÓN SIN FORM -->
    <button type="button" onclick="vote(this, 'mbappe_out')" class="btn-red">
        REMOVE MBAPPÉ ❌
    </button>

    <!-- 🟡 MBAPPÉ STAY -->
    <div class="vote-box">
        <div class="vote-header">
            <span id="mbappeStayCount" class="counter-number">0</span>
            <div class="vote-goal gold">
                <span>200,000</span>
                <small>GOAL</small>
            </div>
        </div>

        <div class="vote-label">KEEP MBAPPÉ</div>

        <div class="vote-bar">
            <div id="mbappeStayBar" class="vote-fill gold"></div>
        </div>
    </div>

    <!-- 🔥 BOTÓN SIN FORM -->
    <button type="button" onclick="vote(this, 'mbappe_stay')" class="btn-gold">
        KEEP MBAPPÉ ⭐
    </button>

</div>
<!-- 🟡 VINICIUS -->
<div class="side">

    <div class="hero">
        <img src="/img/vini.png" class="hero-img">
        <div class="overlay"></div>
        <div class="stamp gold">STAY?</div>
    </div>

    <div class="desc">
        Decide Vinícius future at Real Madrid. Your vote matters.
    </div>

    <!-- 🔴 VINI OUT -->
    <div class="vote-box">
        <div class="vote-header">
            <span id="viniOutCount" class="counter-number">0</span>
            <div class="vote-goal">
                <span>200,000</span>
                <small>GOAL</small>
            </div>
        </div>

        <div class="vote-label">REMOVE VINICIUS</div>

        <div class="vote-bar">
            <div id="viniOutBar" class="vote-fill red"></div>
        </div>
    </div>

    <!-- 🔥 BOTÓN SIN FORM -->
    <button type="button" onclick="vote(this, 'vini_out')" class="btn-red">
        REMOVE VINICIUS ❌
    </button>

    <!-- 🟡 VINI STAY -->
    <div class="vote-box">
        <div class="vote-header">
            <span id="viniStayCount" class="counter-number">0</span>
            <div class="vote-goal gold">
                <span>200,000</span>
                <small>GOAL</small>
            </div>
        </div>

        <div class="vote-label">KEEP VINICIUS</div>

        <div class="vote-bar">
            <div id="viniStayBar" class="vote-fill gold"></div>
        </div>
    </div>

    <!-- 🔥 BOTÓN SIN FORM -->
    <button type="button" onclick="vote(this, 'vini_stay')" class="btn-gold">
        KEEP VINICIUS ⭐
    </button>

</div>
<script>

// =========================
// 🔥 VOTO SIN RECARGA
// =========================
async function vote(btn, option) {

    const group = option.includes("mbappe") ? "mbappe" : "vini";

    // 🔒 si ya votó
    if (localStorage.getItem(group)) {
        showToast("YOU'VE ALREADY SIGNED");
        return;
    }

    const res = await fetch("/vote", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: `option=${option}`
    });

    const data = await res.json();

    if (data.ok) {

        // 💾 guardar voto local
        localStorage.setItem(group, option);

        // ✔ marcar botón
        btn.innerHTML += " ✔";
        btn.style.border = "2px solid #00ff88";
        btn.style.boxShadow = "0 0 12px #00ff88";

        // 🔒 bloquear grupo
        document.querySelectorAll("button").forEach(b => {
            if (b.getAttribute("onclick")?.includes(group)) {
                b.disabled = true;
                b.style.opacity = "0.5";
            }
        });

        showToast("THANK YOU FOR VOTING");

    } else {
        showToast("YOU'VE ALREADY SIGNED");
    }
}


// =========================
// 💬 MENSAJE (TOAST)
// =========================
function showToast(text) {
    let toast = document.createElement("div");
    toast.innerText = text;

    toast.style.position = "fixed";
    toast.style.bottom = "20px";
    toast.style.left = "50%";
    toast.style.transform = "translateX(-50%)";
    toast.style.background = "#00ff88";
    toast.style.color = "#000";
    toast.style.padding = "12px 25px";
    toast.style.borderRadius = "25px";
    toast.style.fontWeight = "700";
    toast.style.zIndex = "9999";

    document.body.appendChild(toast);

    setTimeout(() => toast.remove(), 2000);
}


// =========================
// 🔄 RESTAURAR ESTADO
// =========================
window.onload = () => {

    ["mbappe", "vini"].forEach(group => {

        const vote = localStorage.getItem(group);

        if (vote) {

            // 🔒 bloquear botones
            document.querySelectorAll("button").forEach(b => {
                if (b.getAttribute("onclick")?.includes(group)) {
                    b.disabled = true;
                    b.style.opacity = "0.5";
                }
            });

            // ✔ marcar botón elegido
            const btn = [...document.querySelectorAll("button")]
                .find(b => b.getAttribute("onclick")?.includes(vote));

            if (btn && !btn.innerHTML.includes("✔")) {
                btn.innerHTML += " ✔";
                btn.style.border = "2px solid #00ff88";
                btn.style.boxShadow = "0 0 12px #00ff88";
            }
        }

    });

};


// =========================
// 📊 STATS (TU SISTEMA)
// =========================
async function updateStats() {
    try {
        const res = await fetch('/stats');
        const data = await res.json();

        const mbappeOut = data.mbappe_out || 0;
        const mbappeStay = data.mbappe_stay || 0;
        const viniOut = data.vini_out || 0;
        const viniStay = data.vini_stay || 0;
        const GOAL = data.goal || 200000;

        animateValue("mbappeOutCount", mbappeOut);
        animateValue("mbappeStayCount", mbappeStay);
        animateValue("viniOutCount", viniOut);
        animateValue("viniStayCount", viniStay);

        function calc(votos, goal) {
            if (goal <= 0) goal = 1;
            return Math.min((votos / goal) * 100, 100);
        }

        document.getElementById("mbappeOutBar").style.width =
            calc(mbappeOut, GOAL) + "%";

        document.getElementById("mbappeStayBar").style.width =
            calc(mbappeStay, GOAL) + "%";

        document.getElementById("viniOutBar").style.width =
            calc(viniOut, GOAL) + "%";

        document.getElementById("viniStayBar").style.width =
            calc(viniStay, GOAL) + "%";

    } catch (e) {
        console.log("❌ error stats", e);
    }
}


// =========================
// 🔢 ANIMACIÓN
// =========================
function animateValue(id, newValue) {
    const el = document.getElementById(id);
    if (!el) return;

    const current = parseInt(el.innerText.replace(/\./g, '')) || 0;
    if (current === newValue) return;

    let start = current;
    const increment = (newValue - start) / 20;

    const timer = setInterval(() => {
        start += increment;

        el.innerText = Math.floor(start).toLocaleString("es-CO");

        if (Math.abs(start - newValue) < 1) {
            el.innerText = newValue.toLocaleString("es-CO");
            clearInterval(timer);
        }
    }, 20);
}


// =========================
// 🚀 AUTO UPDATE
// =========================
setInterval(updateStats, 10000);
updateStats();

</script>

</body>
</html>
