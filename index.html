<!DOCTYPE html>
<html>
<head>
    <title>MBAPPE OUT</title>
    <link rel="stylesheet" href="/estilos.css">
</head>
<body>

<h1 class="title">MAKE YOUR VOICE HEARD</h1>

<div class="container">

    <!-- 🔴 MBAPPE -->
    <div class="side">
        <div class="card">

            <img src="/img/mbappe.png" class="player">

            <div class="desc">
                Madridistas, make your voice heard. Sign this petition.
            </div>

            <div class="counter-card">
                <div class="counter-top">
                    <div id="mbappeCount" class="counter-number">0</div>
                    <div class="goal">
                        <span>200,000</span>
                        <small>GOAL</small>
                    </div>
                </div>

                <div class="counter-label">MADRIDISTAS SIGNED</div>

                <div class="progress">
                    <div id="mbappeBar" class="bar bar-red"></div>
                </div>

                <div class="percent">live campaign</div>
            </div>

            <form action="/vote" method="post">
                <button name="option" value="mbappe" class="btn-red">
                    SIGN THE PETITION 
                </button>
            </form>

            <form action="/vote" method="post">
                <button name="option" value="stay" class="btn-gold">
                    KEEP MBAPPE 
                </button>
            </form>

        </div>
    </div>

    <!-- 🟡 VINICIUS -->
    <div class="side">
        <div class="card">

            <img src="/img/vini.png" class="player">

            <div class="desc">
                Support Vinícius and keep him leading Real Madrid.
            </div>

            <div class="counter-card">
                <div class="counter-top">
                    <div id="viniCount" class="counter-number">0</div>
                    <div class="goal">
                        <span>200,000</span>
                        <small>GOAL</small>
                    </div>
                </div>

                <div class="counter-label">MADRIDISTAS SIGNED</div>

                <div class="progress">
                    <div id="viniBar" class="bar bar-gold"></div>
                </div>

                <div class="percent">live campaign</div>
            </div>

            <form action="/vote" method="post">
                <button name="option" value="mbappe" class="btn-red">
                    REMOVE MBAPPE 
                </button>
            </form>

            <form action="/vote" method="post">
                <button name="option" value="stay" class="btn-gold">
                    KEEP VINICIUS 
                </button>
            </form>

        </div>
    </div>

</div>

<script>
async function updateStats() {
    try {
        const res = await fetch('/stats');
        const data = await res.json();

        const mbappe = data.mbappe || 0;
        const vini = data.vinicius || 0;
        const stay = data.stay || 0;

        const total = mbappe + vini + stay || 1;

        animateValue("mbappeCount", mbappe);
        animateValue("viniCount", vini);

        document.getElementById("mbappeBar").style.width =
            (mbappe / total * 100) + "%";

        document.getElementById("viniBar").style.width =
            (vini / total * 100) + "%";

    } catch (e) {
        console.log("error stats", e);
    }
}

function animateValue(id, newValue) {
    const el = document.getElementById(id);
    const current = parseInt(el.innerText) || 0;

    if (current === newValue) return;

    let start = current;
    const duration = 400;
    const stepTime = 20;
    const steps = duration / stepTime;
    const increment = (newValue - start) / steps;

    let count = 0;

    const timer = setInterval(() => {
        start += increment;
        el.innerText = Math.floor(start);

        count++;
        if (count >= steps) {
            el.innerText = newValue;
            clearInterval(timer);

            el.classList.add("flash");
            setTimeout(() => el.classList.remove("flash"), 300);
        }
    }, stepTime);
}

setInterval(updateStats, 3000);
updateStats();
</script>

</body>
</html>
