<!DOCTYPE html>
<html>
<head>
    <title>MBAPPE OUT</title>
    <link rel="stylesheet" href="/estilos.css">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<h1 class="title">MAKE YOUR VOICE HEARD</h1>

<div class="container">

<div class="side">

    <div class="hero">
        <img src="/img/mbappe.png" class="hero-img">
        <div class="overlay"></div>
        <div class="stamp red">OUT</div>
    </div>

    <div class="desc">
        Madridistas, make your voice heard. Decide Mbappé’s future.
    </div>

    <!-- 🔴 OUT -->
    <div class="vote-box">
        <div class="vote-header">
            <span id="mbappeOutCount" class="counter-number">0</span>
            <div class="vote-goal">
                <span>200,000</span>
                <small>GOAL</small>
            </div>
        </div>

        <div class="vote-label">REMOVE MBAPPÉ</div>

        <div class="vote-bar">
            <div id="mbappeOutBar" class="vote-fill red"></div>
        </div>
    </div>

    <form action="/vote" method="post">
        <button name="option" value="mbappe_out" class="btn-red">
            REMOVE MBAPPÉ ❌
        </button>
    </form>

    <!-- 🟡 STAY -->
    <div class="vote-box">
        <div class="vote-header">
            <span id="mbappeStayCount" class="counter-number">0</span>
            <div class="vote-goal gold">
                <span>200,000</span>
                <small>GOAL</small>
            </div>
        </div>

        <div class="vote-label">KEEP MBAPPÉ</div>

        <div class="vote-bar">
            <div id="mbappeStayBar" class="vote-fill gold"></div>
        </div>
    </div>

    <form action="/vote" method="post">
        <button name="option" value="mbappe_stay" class="btn-gold">
            KEEP MBAPPÉ ⭐
        </button>
    </form>

</div>

<div class="side">

    <div class="hero">
        <img src="/img/vini.png" class="hero-img">
        <div class="overlay"></div>
        <div class="stamp gold">STAY</div>
    </div>

    <div class="desc">
        Support Vinícius and keep him leading Real Madrid.
    </div>

    <!-- 🔴 OUT -->
    <div class="vote-box">
        <div class="vote-header">
            <span id="viniOutCount" class="counter-number">0</span>
            <div class="vote-goal">
                <span>200,000</span>
                <small>GOAL</small>
            </div>
        </div>

        <div class="vote-label">REMOVE VINICIUS</div>

        <div class="vote-bar">
            <div id="viniOutBar" class="vote-fill red"></div>
        </div>
    </div>

    <form action="/vote" method="post">
        <button name="option" value="vini_out" class="btn-red">
            REMOVE VINICIUS ❌
        </button>
    </form>

    <!-- 🟡 STAY -->
    <div class="vote-box">
        <div class="vote-header">
            <span id="viniStayCount" class="counter-number">0</span>
            <div class="vote-goal gold">
                <span>200,000</span>
                <small>GOAL</small>
            </div>
        </div>

        <div class="vote-label">KEEP VINICIUS</div>

        <div class="vote-bar">
            <div id="viniStayBar" class="vote-fill gold"></div>
        </div>
    </div>

    <form action="/vote" method="post">
        <button name="option" value="vini_stay" class="btn-gold">
            KEEP VINICIUS ⭐
        </button>
    </form>

</div>

<footer class="mini-footer">
    HALA MADRID
</footer>

<script>
async function updateStats() {
    try {
        const res = await fetch('/stats');
        const data = await res.json();

        const mbappe = data.mbappe || 0;
        const vini = data.vinicius || 0;
        const stay = data.stay || 0;

        const total = mbappe + vini + stay || 1;

        animateValue("mbappeCount", mbappe);
        animateValue("viniCount", vini);

        document.getElementById("mbappeBar").style.width =
            (mbappe / total * 100) + "%";

        document.getElementById("viniBar").style.width =
            (vini / total * 100) + "%";

    } catch (e) {
        console.log("error stats", e);
    }
}

function animateValue(id, newValue) {
    const el = document.getElementById(id);
    const current = parseInt(el.innerText) || 0;

    if (current === newValue) return;

    let start = current;
    const increment = (newValue - start) / 20;

    const timer = setInterval(() => {
        start += increment;
        el.innerText = Math.floor(start);

        if (Math.abs(start - newValue) < 1) {
            el.innerText = newValue;
            clearInterval(timer);
        }
    }, 20);
}

setInterval(updateStats, 3000);
updateStats();
</script>

</body>
</html>
